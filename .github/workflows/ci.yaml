name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/app

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js 26
        uses: actions/setup-node@v5
        with:
          node-version: 26

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || {
            echo "npm ci failed. Dumping npm logs..."
            ls -la "$HOME/.npm/_logs" || true
            tail -n +1 "$HOME/.npm/_logs"/*.log || true
            exit 1
          }

      - name: Run unit tests
        run: npm test
