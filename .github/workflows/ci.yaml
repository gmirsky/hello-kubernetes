name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/app

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js 26
        uses: actions/setup-node@v5
        with:
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
